<div class="space-y-6">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 font-['Ubuntu'] tracking-tight">Projets</h1>
      <p class="text-gray-500 font-medium mt-1">Gérez le portfolio de projets accompagnés.</p>
    </div>
    <button (click)="openModal()" class="bg-[#036eb1] hover:bg-[#036eb1]/90 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-[#036eb1]/20 transition-all flex items-center space-x-2">
      <i class="fas fa-plus text-xs"></i>
      <span>Nouveau Projet</span>
    </button>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-600 px-6 py-4 rounded-2xl font-bold flex items-center space-x-2">
    <i class="fas fa-check-circle"></i>
    <span>{{ successMessage }}</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="bg-[#ae151e]/10 border border-[#ae151e]/20 text-[#ae151e] px-6 py-4 rounded-2xl font-bold flex items-center space-x-2">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ errorMessage }}</span>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#036eb1]"></div>
  </div>

  <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let item of projets" class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden group hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
      <div class="h-48 bg-gray-100 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center space-x-4">
           <button (click)="openModal(item)" class="w-10 h-10 bg-white rounded-full text-[#036eb1] flex items-center justify-center hover:scale-110 transition-transform"><i class="fas fa-edit"></i></button>
           <button (click)="onDelete(item.id!)" class="w-10 h-10 bg-white rounded-full text-[#ae151e] flex items-center justify-center hover:scale-110 transition-transform"><i class="fas fa-trash"></i></button>
        </div>
        <img [src]="item.image || 'assets/images/hero-business.jpg'" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest text-[#036eb1] shadow-sm z-20">
          {{ item.category }}
        </div>
      </div>
      <div class="p-6">
        <h3 class="text-lg font-bold text-gray-900 font-['Ubuntu'] mb-2 group-hover:text-[#036eb1] transition-colors">{{ item.title }}</h3>
        <p class="text-sm text-gray-500 line-clamp-2 leading-relaxed">{{ item.description }}</p>
      </div>
    </div>
  </div>

  <!-- Modal Form -->
  <div *ngIf="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-zoom-in">
      <div class="p-8 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-2xl font-black text-gray-900 font-['Ubuntu'] tracking-tight">
          {{ isEditing ? 'Modifier' : 'Ajouter' }} un projet
        </h3>
        <button (click)="closeModal()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-900 rounded-full hover:bg-gray-100 transition-all">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form [formGroup]="projetForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6 overflow-y-auto max-h-[70vh]">
        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Titre du projet</label>
          <input type="text" formControlName="title" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all">
        </div>

        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Catégorie</label>
          <select formControlName="category" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all bg-white">
            <option value="Énergie">Énergie</option>
            <option value="Industrie">Industrie</option>
            <option value="Services">Services</option>
          </select>
        </div>
        
        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">URL de l'image</label>
          <input type="text" formControlName="image" placeholder="assets/images/..." class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all">
        </div>

        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Description</label>
          <textarea formControlName="description" rows="4" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all"></textarea>
        </div>

        <div class="pt-4 flex space-x-4">
          <button type="button" (click)="closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all">Annuler</button>
          <button type="submit" [disabled]="projetForm.invalid" class="flex-1 bg-[#036eb1] text-white font-bold py-4 rounded-2xl shadow-lg shadow-[#036eb1]/20 hover:bg-[#036eb1]/90 disabled:opacity-50 transition-all">
            {{ isEditing ? 'Mettre à jour' : 'Enregistrer' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
