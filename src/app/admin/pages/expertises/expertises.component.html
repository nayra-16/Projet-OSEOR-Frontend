<div class="space-y-6">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 font-['Ubuntu'] tracking-tight">Expertises</h1>
      <p class="text-gray-500 font-medium mt-1">Gérez les expertises affichées sur le site.</p>
    </div>
    <button (click)="openModal()" class="bg-[#036eb1] hover:bg-[#036eb1]/90 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-[#036eb1]/20 transition-all flex items-center space-x-2">
      <i class="fas fa-plus text-xs"></i>
      <span>Ajouter</span>
    </button>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-600 px-6 py-4 rounded-2xl font-bold flex items-center space-x-2 animate-fade-in">
    <i class="fas fa-check-circle"></i>
    <span>{{ successMessage }}</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="bg-[#ae151e]/10 border border-[#ae151e]/20 text-[#ae151e] px-6 py-4 rounded-2xl font-bold flex items-center space-x-2 animate-fade-in">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ errorMessage }}</span>
  </div>

  <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
    <div *ngIf="isLoading" class="flex justify-center py-12">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#036eb1]"></div>
    </div>

    <table *ngIf="!isLoading" class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50/50 border-b border-gray-100">
          <th class="p-6 text-xs font-black text-gray-400 uppercase tracking-widest">Icone</th>
          <th class="p-6 text-xs font-black text-gray-400 uppercase tracking-widest">Titre</th>
          <th class="p-6 text-xs font-black text-gray-400 uppercase tracking-widest">Description</th>
          <th class="p-6 text-xs font-black text-gray-400 uppercase tracking-widest text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <tr *ngFor="let item of expertises" class="hover:bg-gray-50/30 transition-colors group">
          <td class="p-6">
            <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-[#036eb1] border border-gray-100 group-hover:bg-white group-hover:shadow-sm transition-all">
              <i [class]="item.icon"></i>
            </div>
          </td>
          <td class="p-6 font-bold text-gray-900">{{ item.title }}</td>
          <td class="p-6 text-gray-500 text-sm max-w-md line-clamp-1">{{ item.description }}</td>
          <td class="p-6 text-right">
            <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button (click)="openModal(item)" class="p-2 text-[#036eb1] hover:bg-[#036eb1]/10 rounded-lg transition-colors"><i class="fas fa-edit"></i></button>
              <button (click)="onDelete(item.id!)" class="p-2 text-[#ae151e] hover:bg-[#ae151e]/10 rounded-lg transition-colors"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div *ngIf="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-zoom-in">
      <div class="p-8 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-2xl font-black text-gray-900 font-['Ubuntu'] tracking-tight">
          {{ isEditing ? 'Modifier' : 'Ajouter' }} une expertise
        </h3>
        <button (click)="closeModal()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-900 rounded-full hover:bg-gray-100 transition-all">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form [formGroup]="expertiseForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Titre</label>
          <input type="text" formControlName="title" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all">
        </div>
        
        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Icone (FontAwesome class)</label>
          <input type="text" formControlName="icon" placeholder="fas fa-lightbulb" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all">
        </div>

        <div class="space-y-2">
          <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Description</label>
          <textarea formControlName="description" rows="4" class="w-full border border-gray-200 p-4 rounded-xl focus:ring-2 focus:ring-[#036eb1] outline-none transition-all"></textarea>
        </div>

        <div class="pt-4 flex space-x-4">
          <button type="button" (click)="closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all">Annuler</button>
          <button type="submit" [disabled]="expertiseForm.invalid" class="flex-1 bg-[#036eb1] text-white font-bold py-4 rounded-2xl shadow-lg shadow-[#036eb1]/20 hover:bg-[#036eb1]/90 disabled:opacity-50 transition-all">
            {{ isEditing ? 'Mettre à jour' : 'Enregistrer' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
