<div class="space-y-8 animate-fade-in">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-black text-slate-900 font-['Ubuntu'] tracking-tight">{{ 'ADMIN.SETTINGS_TITLE' | translate }}</h1>
      <p class="text-slate-500 mt-1 font-medium">{{ 'ADMIN.SETTINGS_DESC' | translate }}</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 md:p-10">
        <h2 class="text-xl font-bold text-slate-900 mb-8 font-['Ubuntu']">{{ 'ADMIN.PROFILE' | translate }}</h2>
        
        <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Nom complet</label>
              <input type="text" formControlName="name" class="w-full border border-slate-200 p-4 rounded-xl focus:ring-4 focus:ring-oseor-blue/5 focus:border-oseor-blue outline-none transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Email</label>
              <input type="email" formControlName="email" class="w-full border border-slate-200 p-4 rounded-xl focus:ring-4 focus:ring-oseor-blue/5 focus:border-oseor-blue outline-none transition-all">
            </div>
          </div>
          
          <div class="space-y-2 pt-4 border-t border-slate-50">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">{{ 'ADMIN.NEW_PASSWORD' | translate }}</label>
            <input type="password" formControlName="newPassword" class="w-full border border-slate-200 p-4 rounded-xl focus:ring-4 focus:ring-oseor-blue/5 focus:border-oseor-blue outline-none transition-all" placeholder="••••••••">
          </div>

          <div class="flex justify-end pt-4">
            <button type="submit" 
                    class="bg-oseor-blue hover:bg-oseor-blue/90 text-white px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition-all shadow-lg shadow-oseor-blue/20">
              {{ 'ADMIN.SAVE_CHANGES' | translate }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
