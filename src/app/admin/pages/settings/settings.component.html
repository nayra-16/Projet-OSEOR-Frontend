<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-black text-gray-900 font-['Ubuntu'] tracking-tight">Paramètres</h1>
    <p class="text-gray-500 font-medium mt-1">Gérez votre profil et les configurations système.</p>
  </div>

  <div class="max-w-2xl bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
    <div class="p-8 space-y-8">
      <div class="space-y-4">
        <h3 class="text-lg font-bold text-gray-900 font-['Ubuntu'] flex items-center">
          <i class="fas fa-user-circle text-[#036eb1] mr-3"></i>

        </h3>
        <div class="grid grid-cols-1 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Email</label>
            <input type="email" value="admin@oseor.tg" disabled class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl text-gray-500 outline-none cursor-not-allowed">
          </div>
          <div class="space-y-2">

          </div>
        </div>
      </div>

      <div class="pt-8 border-t border-gray-50 flex justify-end">
        <button class="bg-[#036eb1] hover:bg-[#036eb1]/90 text-white font-bold py-3 px-8 rounded-2xl shadow-lg shadow-[#036eb1]/20 transition-all transform active:scale-[0.98]">

      </div>
